<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>artbyo3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:    #0a0908;
  --surface: #0f0d0b;
  --ink:   #cec5b4;
  --muted: #2a241c;
  --dim:   #5a4e3a;
  --line:  #1e1910;
  --pink:  #d45c9a;
  --violet:#7755ee;
  --gold:  #c8872a;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Space Mono',monospace;overflow-x:hidden}

/* scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* cursor (disabled - use native) */
#cur,#cur-r{display:none}

/* ── PAGES ── */
.pg{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;background:var(--bg);scroll-behavior:smooth}
.pg.off{pointer-events:none;opacity:0;transform:translateY(15px);transition:opacity .25s,transform .25s}
.pg.on{opacity:1;transform:translateY(0);transition:opacity .25s,transform .25s}

/* ── SITE HEADER (all pages) ── */
.nav-logo{position:fixed;top:1.4rem;left:1.8rem;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:-.02em;color:var(--ink);text-decoration:none;z-index:100;transition:transform .1s,color .2s}
.nav-logo:hover{color:var(--dim)}


/* ── HOME ── */
#home-hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--line);
  position:relative;
  overflow:hidden;
}
#home-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 120%, rgba(119,85,238,0.06) 0%, transparent 50%),
              radial-gradient(circle at 50% 120%, rgba(212,92,154,0.04) 0%, transparent 40%);
  pointer-events:none;z-index:1;
}
.hero-left{
  position:relative;
  padding:6rem 3rem 4rem;
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;justify-content:space-between;
  overflow:hidden;
}
.hero-left video,.hero-name,.hero-bio,.hero-right{transition:transform .1s}
.hero-left video{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.4;z-index:0;
  transform:scale(1.1);
}
.hero-left>*{position:relative;z-index:1}
.hero-name{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:clamp(4rem,10vw,8rem);
  line-height:.95;
  letter-spacing:-.03em;
  color:var(--ink);
}
.hero-bio{
  font-size:.75rem;line-height:1.9;color:var(--dim);
  max-width:360px;margin-top:auto;padding-top:3rem;
}
.hero-bio strong{color:var(--ink);font-weight:400}

.hero-right{
  display:grid;grid-template-rows:1fr 1fr;
}
.hero-zone{
  position:relative;overflow:hidden;
  display:flex;align-items:flex-end;
  padding:2.4rem;cursor:pointer;border:none;background:none;text-align:left;
  transition:background .3s;
  border:1px solid transparent;
}
.hero-zone:hover{border-color:var(--line)}
.hero-zone:first-child{border-bottom:1px solid var(--line)}
.hero-zone canvas{position:absolute;inset:0;width:100%;height:100%}
.hero-zone::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(10,9,8,.92) 0%,rgba(10,9,8,.3) 50%,transparent 100%);
  transition:opacity .4s;
}
.hero-zone:hover::after{opacity:.7}
.hz-content{position:relative;z-index:1;display:flex;flex-direction:column;gap:.5rem}
.hz-label{font-size:.55rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);transition:color .3s}
.hz-title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(2rem,4vw,3.2rem);line-height:1;letter-spacing:-.03em;
  color:var(--ink);transition:color .3s;
}
.hz-sub{font-size:.6rem;color:var(--dim);letter-spacing:.1em;opacity:0;transform:translateY(4px);transition:opacity .3s,transform .3s}
.hero-zone:hover .hz-sub{opacity:1;transform:none}
.hero-zone.z2:hover .hz-title{color:var(--pink)}
.hero-zone.z2:hover .hz-label{color:var(--pink)}
.hero-zone.z3:hover .hz-title{color:var(--violet)}
.hero-zone.z3:hover .hz-label{color:var(--violet)}

/* index strip below hero */
.home-index{
  display:grid;grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--line);
}
.idx-col{padding:2.4rem 3rem}
.idx-col:first-child{border-right:1px solid var(--line)}
.idx-col-head{
  font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);
  margin-bottom:1.4rem;display:flex;align-items:center;gap:.8rem;
}
.idx-col-head::after{content:'';flex:1;height:1px;background:var(--line)}
.idx-entry{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:.8rem 0;border-bottom:1px solid var(--line);cursor:pointer;
  transition:opacity .2s,padding-left .2s;
}
.idx-entry:hover{padding-left:.5rem;opacity:1}
.idx-entry:last-child{border-bottom:none}
.idx-entry button{background:none;border:none;font-family:'Space Mono',monospace;font-size:.72rem;color:var(--ink);cursor:pointer;padding:0;text-align:left}
.idx-entry span{font-size:.55rem;color:var(--dim);letter-spacing:.1em}


/* ── GALLERY PAGES ── */
.gal-hero{
  padding:4rem 3rem 3rem;
  border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:flex-end;
}
.gal-hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.4rem,6vw,5rem);letter-spacing:-.03em;line-height:1}
.gal-hero-title span{display:block;font-size:.58rem;font-family:'Space Mono',monospace;font-weight:400;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);margin-bottom:.6rem}
.gal-count{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}

.gal-body{padding:0 3rem}

/* masonry-ish grid */
.gal-grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:1px;
  border-left:1px solid var(--line);
  border-right:1px solid var(--line);
}
.gc{
  position:relative;overflow:hidden;
  background:var(--surface);
  cursor:pointer;
  transition:opacity .25s,border .25s;
  border:1px solid transparent;
}
.gc:hover{opacity:.85}
.gc canvas{position:absolute;inset:0;width:100%;height:100%}
.gc-meta{
  position:absolute;bottom:0;left:0;right:0;
  padding:1.2rem 1.4rem;
  background:linear-gradient(to top,rgba(10,9,8,.88) 0%,transparent 100%);
  z-index:1;
}
.gc-tag{font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:.25rem}
.gc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;color:var(--ink)}
.gc-note{font-size:.55rem;color:var(--dim);margin-top:.15rem}

/* real image fill */
.gc-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}

/* grid spans — 2d (repeating every 6) */
#grid-2d .gc:nth-child(6n+1){grid-column:span 7;height:420px}
#grid-2d .gc:nth-child(6n+2){grid-column:span 5;height:420px}
#grid-2d .gc:nth-child(6n+3){grid-column:span 4;height:280px}
#grid-2d .gc:nth-child(6n+4){grid-column:span 8;height:280px}
#grid-2d .gc:nth-child(6n+5){grid-column:span 6;height:320px}
#grid-2d .gc:nth-child(6n+6){grid-column:span 6;height:320px}

/* grid spans — 3d (repeating every 6) */
#grid-3d .gc:nth-child(6n+1){grid-column:span 12;height:380px}
#grid-3d .gc:nth-child(6n+2){grid-column:span 5;height:300px}
#grid-3d .gc:nth-child(6n+3){grid-column:span 7;height:300px}
#grid-3d .gc:nth-child(6n+4){grid-column:span 6;height:280px}
#grid-3d .gc:nth-child(6n+5){grid-column:span 3;height:280px}
#grid-3d .gc:nth-child(6n+6){grid-column:span 3;height:280px}

/* 2d accent */
#pg-2d .gal-hero-title{color:var(--pink)}
#pg-2d .gc{cursor:none}
#pg-2d .gc:hover{outline:1px solid var(--pink)}
#pg-2d .gc:hover .gc-open{opacity:1;transform:translate(-50%,-50%) scale(1)}

.gc-open{
  position:absolute;top:50%;left:50%;z-index:2;
  transform:translate(-50%,-50%) scale(.88);
  opacity:0;transition:opacity .25s,transform .25s;
  width:48px;height:48px;border-radius:50%;
  border:1px solid rgba(212,92,154,.6);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.gc-open::after{content:'↗';font-size:.7rem;color:var(--pink)}

/* ── LIGHTBOX ── */
#lb{
  position:fixed;inset:0;z-index:8000;
  background:rgba(10,9,8,.97);
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .35s;
}
#lb.open{opacity:1;pointer-events:all}
#lb-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 2rem;border-bottom:1px solid var(--line);flex-shrink:0;
}
#lb-info{display:flex;flex-direction:column;gap:.3rem}
#lb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--ink)}
#lb-sub{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
#lb-actions{display:flex;align-items:center;gap:1rem}
.lb-btn{
  background:none;border:1px solid var(--line);cursor:none;
  font-family:'Space Mono',monospace;font-size:.58rem;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--dim);padding:.45rem .85rem;
  transition:color .2s,border-color .2s;
}
.lb-btn:hover{color:var(--ink);border-color:var(--dim)}
.lb-btn.dl:hover{color:var(--pink);border-color:var(--pink)}
#lb-close{font-size:1rem;padding:.35rem .7rem}
#lb-stage{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding:2.5rem 5rem;
}
#lb-canvas-wrap{position:absolute;inset:2.5rem 5rem;display:flex;align-items:center;justify-content:center}
#lb-canvas-wrap canvas{max-width:100%;max-height:100%;border-radius:2px}
#lb-img{max-width:100%;max-height:100%;object-fit:contain;position:relative;z-index:1;opacity:0;transition:opacity .3s;display:none}
#lb-img.show{display:block;opacity:1}
#lb-prev,#lb-next{
  position:absolute;top:50%;transform:translateY(-50%);z-index:2;
  background:none;border:1px solid var(--line);color:var(--dim);
  cursor:none;width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:.75rem;
  transition:color .2s,border-color .2s;
}
#lb-prev{left:1.2rem}#lb-next{right:1.2rem}
#lb-prev:hover,#lb-next:hover{color:var(--ink);border-color:var(--dim)}
#lb-strip-row{
  display:flex;align-items:center;gap:8px;
  padding:.9rem 2rem;border-top:1px solid var(--line);flex-shrink:0;overflow-x:auto;
  scrollbar-width:none;
}
#lb-strip-row::-webkit-scrollbar{display:none}
.lb-thumb{
  width:52px;height:52px;flex-shrink:0;border-radius:2px;
  overflow:hidden;position:relative;border:1px solid var(--line);
  cursor:none;opacity:.35;transition:opacity .2s,border-color .2s;
}
.lb-thumb.act{opacity:1;border-color:var(--pink)}
.lb-thumb canvas{position:absolute;inset:0;width:100%;height:100%}
#lb-counter{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);white-space:nowrap;margin-left:auto}

/* 3d accent */
#pg-3d .gal-hero-title{color:var(--violet)}
#pg-3d .gc:hover{outline:1px solid var(--violet)}


@media(max-width:720px){
  #home-hero{grid-template-columns:1fr}
  .hero-right{grid-template-rows:auto auto}
  .hero-zone{min-height:220px}
  .hero-zone:first-child{border-bottom:1px solid var(--line)}
  .home-index{grid-template-columns:1fr}
  .idx-col:first-child{border-right:none;border-bottom:1px solid var(--line)}
  .site-nav{padding:1.2rem 1.4rem}
  .gal-body{padding:0 1rem}
  .gal-hero{padding:2.5rem 1.4rem 2rem}
  #grid-2d .gc:nth-child(n),#grid-3d .gc:nth-child(n){grid-column:span 12;height:240px}
}
</style>
</head>
<body>


<!-- ══════════════ HOME ══════════════ -->
<div class="pg on" id="pg-home">

  <a class="nav-logo" href="#" onclick="show('home');return false" style="position:fixed;top:1.4rem;left:1.8rem;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:-.02em;color:var(--ink);text-decoration:none;z-index:100">artbyo<span>3</span></a>
  
  <div id="home-hero">
    <div class="hero-left">
      <video autoplay muted loop playsinline>
        <source src="/videos/0405.mp4" type="video/mp4">
      </video>
      <div>
        <div class="hero-name">artbyo3</div>
      </div>

    </div>

    <div class="hero-right">
      <button class="hero-zone z2" onclick="show('2d')">

          <span class="hz-label">illustration</span>
          <span class="hz-title">2d</span>

        </div>
      </button>
      <button class="hero-zone z3" onclick="show('3d')">
        <canvas data-phue="260" data-ps="wave"></canvas>

          <span class="hz-title">3d</span>
          <span class="hz-sub">clothes for virtual avatars</span>
        </div>
      </button>
    </div>
  </div>


</div>

<!-- ══════════════ 2D ══════════════ -->
<div class="pg off" id="pg-2d">

  <a class="nav-logo" href="#" onclick="show('home');return false" style="position:fixed;top:1.4rem;left:1.8rem;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:-.02em;color:var(--ink);text-decoration:none;z-index:100">artbyo<span>3</span></a>
  
  <div class="gal-hero">
    <div class="gal-hero-title">
      <span>illustration</span>
      2d
    </div>
    <span class="gal-count" id="count-2d">— works</span>
  </div>

  <div class="gal-body">
    <div class="gal-grid" id="grid-2d"></div>
  </div>

</div>

<!-- ══════════════ 3D ══════════════ -->
<div class="pg off" id="pg-3d">

  <a class="nav-logo" href="#" onclick="show('home');return false" style="position:fixed;top:1.4rem;left:1.8rem;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:-.02em;color:var(--ink);text-decoration:none;z-index:100">artbyo<span>3</span></a>
  
  <div class="gal-hero">
    <div class="gal-hero-title">
      <span>3d / vrc</span>
      3d
    </div>
    <span class="gal-count" id="count-3d">— works</span>
  </div>

  <div class="gal-body">
    <div class="gal-grid" id="grid-3d"></div>
  </div>

</div>

<!-- ── LIGHTBOX ── -->
<div id="lb">
  <div id="lb-bar">
    <div id="lb-info">
      <div id="lb-title">—</div>
      <div id="lb-sub">—</div>
    </div>
    <div id="lb-actions">
      <button class="lb-btn dl" id="lb-dl">download ↓</button>
      <button class="lb-btn" id="lb-close">✕</button>
    </div>
  </div>
  <div id="lb-stage">
    <button id="lb-prev">←</button>
    <div id="lb-canvas-wrap"><canvas id="lb-cv"></canvas></div>
    <img id="lb-img" alt="">
    <button id="lb-next">→</button>
  </div>
  <div id="lb-strip-row">
    <div id="lb-strip"></div>
    <span id="lb-counter"></span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── hero parallax ───────────────────────────────────────────────────────────
const heroVideo=document.querySelector('.hero-left video');
const heroName=document.querySelector('.hero-name');
const heroBio=document.querySelector('.hero-bio');
const heroRight=document.querySelector('.hero-right');
const navLogo=document.querySelector('.nav-logo');
document.addEventListener('mousemove',e=>{
  const cx=(e.clientX-window.innerWidth/2)/(window.innerWidth/2);
  const cy=(e.clientY-window.innerHeight/2)/(window.innerHeight/2);
  if(heroVideo){
    heroVideo.style.transform=`scale(1.1) translate(${cx*15}px,${cy*15}px)`;
  }
  if(heroName){
    heroName.style.transform=`translate(${cx*8}px,${cy*8}px)`;
  }
  if(heroBio){
    heroBio.style.transform=`translate(${cx*4}px,${cy*4}px)`;
  }
  if(heroRight){
    heroRight.style.transform=`translate(${cx*12}px,${cy*12}px)`;
  }
  if(navLogo){
    navLogo.style.transform=`translate(${cx*5}px,${cy*5}px)`;
  }
});

// ── page switching ────────────────────────────────────────────────────────────
let cur_pg='home';
function show(id){
  if(id===cur_pg)return;
  const currentPg=document.getElementById('pg-'+cur_pg);
  currentPg.classList.replace('on','off');
  const next=document.getElementById('pg-'+id);
  setTimeout(()=>{next.scrollTop=0;},250);
  next.classList.replace('off','on');
  cur_pg=id;
}

// keyboard nav: 1=home, 2=2d, 3=3d, arrows, space
document.addEventListener('keydown',e=>{
  const pages=['home','2d','3d'];
  const idx=pages.indexOf(cur_pg);
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();show(pages[Math.min(idx+1,2)]);}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();show(pages[Math.max(idx-1,0)]);}
  if(e.key==='1') show('home');
  if(e.key==='2') show('2d');
  if(e.key==='3') show('3d');
});

// wheel = page navigation (accumulated delta — requires intentional scroll at boundary)
let wheelAccum=0, wheelLocked=false, wheelReset=null;
const WHEEL_THRESH=350;

document.addEventListener('wheel',e=>{
  if(wheelLocked)return;
  const pages=['home','2d','3d'];
  const idx=pages.indexOf(cur_pg);
  const dir=e.deltaY>0?1:-1;
  const nextIdx=Math.max(0,Math.min(2,idx+dir));
  if(nextIdx===idx)return;

  // must be at the scroll boundary first
  const pg=document.getElementById('pg-'+cur_pg);
  const atBottom=pg.scrollTop+pg.clientHeight>=pg.scrollHeight-8;
  const atTop=pg.scrollTop<=8;
  if(dir>0&&!atBottom){wheelAccum=0;return;}
  if(dir<0&&!atTop){wheelAccum=0;return;}

  // accumulate — reset if user pauses
  wheelAccum+=Math.abs(e.deltaY);
  clearTimeout(wheelReset);
  wheelReset=setTimeout(()=>wheelAccum=0,400);

  if(wheelAccum>=WHEEL_THRESH){
    wheelAccum=0;
    clearTimeout(wheelReset);
    wheelLocked=true;
    setTimeout(()=>wheelLocked=false,900);
    show(pages[nextIdx]);
  }
},{passive:true});

// touch swipe = page navigation
let touchY0=0,touchX0=0;
document.addEventListener('touchstart',e=>{
  touchY0=e.touches[0].clientY;
  touchX0=e.touches[0].clientX;
},{passive:true});
document.addEventListener('touchend',e=>{
  const dy=touchY0-e.changedTouches[0].clientY;
  const dx=touchX0-e.changedTouches[0].clientX;
  if(Math.abs(dy)<Math.abs(dx)||Math.abs(dy)<90)return;
  const pages=['home','2d','3d'];
  const idx=pages.indexOf(cur_pg);
  const dir=dy>0?1:-1;
  const nextIdx=Math.max(0,Math.min(2,idx+dir));
  if(nextIdx===idx)return;

  const pg=document.getElementById('pg-'+cur_pg);
  if(dir>0&&pg.scrollTop+pg.clientHeight<pg.scrollHeight-8)return;
  if(dir<0&&pg.scrollTop>8)return;

  show(pages[nextIdx]);
},{passive:true});

// ── shaders ───────────────────────────────────────────────────────────────────
const VERT=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

function mkNoise(h){const hh=(h/360).toFixed(3);return`precision mediump float;
varying vec2 vUv;uniform float u_t;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.;a*=.5;}return v;}
vec3 hsl(float h,float s,float l){vec3 r=clamp(abs(mod(h*6.+vec3(0,4,2),6.)-3.)-1.,0.,1.);return l+s*(r-.5)*(1.-abs(2.*l-1.));}
void main(){
  float t=u_t*.2;float hv=${hh};
  float n=fbm(vUv*2.8+vec2(t,t*.7));float n2=fbm(vUv*5.5-vec2(t*.5,t));
  vec3 col=mix(hsl(hv,.5,.04),mix(hsl(hv+.04,.6,.13),hsl(hv-.03,.5,.26),n2),n);
  gl_FragColor=vec4(col,1.);}`;
}

function mkWave(h){const hh=(h/360).toFixed(3);return`precision mediump float;
varying vec2 vUv;uniform float u_t;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.;a*=.5;}return v;}
vec3 hsl(float h,float s,float l){vec3 r=clamp(abs(mod(h*6.+vec3(0,4,2),6.)-3.)-1.,0.,1.);return l+s*(r-.5)*(1.-abs(2.*l-1.));}
void main(){
  vec2 uv=vUv-.5;float r=length(uv);float a=atan(uv.y,uv.x);
  float sw=fbm(vec2(r*5.-u_t*.5,a*2.+u_t*.3));
  float ring=(1.-smoothstep(.04,.38,r))*smoothstep(.015,.09,r)*(.2+.8*sw);
  float hv=${hh};
  vec3 col=mix(hsl(hv,.5,.03),hsl(hv,.65,.14),ring*.9);
  col=mix(col,hsl(hv,.6,.3),ring*ring*.7);
  col+=hsl(hv,.4,.05)*fbm(vUv*3.+u_t*.05);
  gl_FragColor=vec4(col,1.);}`;
}

function mkGrid(h){const hh=(h/360).toFixed(3);return`precision mediump float;
varying vec2 vUv;uniform float u_t;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.;a*=.5;}return v;}
vec3 hsl(float h,float s,float l){vec3 r=clamp(abs(mod(h*6.+vec3(0,4,2),6.)-3.)-1.,0.,1.);return l+s*(r-.5)*(1.-abs(2.*l-1.));}
void main(){
  float t=u_t*.32;float hv=${hh};
  float n=fbm(vec2(vUv.x*2.8+t*.4,vUv.y*8.));
  float s=pow(sin((vUv.y+n*.12)*3.14159*10.+t*.5)*.5+.5,4.);
  float f=1.-abs(vUv.x-.5)*2.;
  vec3 col=mix(hsl(hv,.5,.03),hsl(hv,.65,.17),s*f*.9);
  col+=hsl(hv,.4,.05)*fbm(vUv*4.5-t*.15);
  gl_FragColor=vec4(col,1.);}`;
}

function initCanvas(cv,hue,type,watchEl){
  const r=new THREE.WebGLRenderer({canvas:cv,alpha:false,antialias:false});
  r.setPixelRatio(1);
  const s=new THREE.Scene(),cam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  const frag=type==='wave'?mkWave(hue):type==='grid'?mkGrid(hue):mkNoise(hue);
  const mat=new THREE.ShaderMaterial({vertexShader:VERT,fragmentShader:frag,uniforms:{u_t:{value:0}}});
  s.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat));
  new ResizeObserver(()=>{r.setSize(cv.offsetWidth||400,cv.offsetHeight||300);}).observe(watchEl);
  r.setSize(cv.offsetWidth||400,cv.offsetHeight||300);
  cv._r=r;cv._s=s;cv._cam=cam;cv._m=mat;
}

// init hero zone canvases
document.querySelectorAll('.hero-zone canvas').forEach(cv=>{
  const zone=cv.closest('.hero-zone');
  initCanvas(cv,parseFloat(cv.dataset.phue||'270'),cv.dataset.ps||'noise',zone);
});

// gallery cards are loaded dynamically from API

// ── main loop ─────────────────────────────────────────────────────────────────
const t0=performance.now();
(function loop(){
  const t=(performance.now()-t0)*.001;

  // hero zones always render
  document.querySelectorAll('.hero-zone canvas').forEach(cv=>{
    if(cv._m){cv._m.uniforms.u_t.value=t;cv._r.render(cv._s,cv._cam);}
  });

  // registered extras
  if(window.__loopExtras) window.__loopExtras.forEach(fn=>fn(t));

  requestAnimationFrame(loop);
})();

// ── GALLERY LOADER ────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

const galLoaded={};
async function loadGallery(cat){
  if(galLoaded[cat])return;
  galLoaded[cat]=true;
  const grid=document.getElementById('grid-'+cat);
  const countEl=document.getElementById('count-'+cat);
  try{
    const r=await fetch('/api/works/'+cat);
    const works=r.ok?await r.json():[];
    if(countEl) countEl.textContent=works.length+' work'+(works.length!==1?'s':'');
    grid.innerHTML=works.map(w=>{
      const src=`/uploads/${w.category}/${w.filename}`;
      return `<div class="gc"
        data-hue="${w.hue||270}" data-s="${esc(w.shader||'noise')}"
        data-title="${esc(w.title)}" data-tag="${esc(w.tag)}" data-src="${src}">
        <canvas></canvas>
        <img class="gc-img" src="${src}" alt="${esc(w.title)}" loading="lazy">
        ${cat==='2d'?'<div class="gc-open"></div>':''}
        <div class="gc-meta">
          <div class="gc-tag">${esc(w.tag)}</div>
          <div class="gc-name">${esc(w.title)}</div>
          ${w.note?`<div class="gc-note">${esc(w.note)}</div>`:''}
        </div>
      </div>`;
    }).join('');
    // shader placeholders for cards (show while image loads)
    grid.querySelectorAll('.gc').forEach(card=>{
      const cv=card.querySelector('canvas');
      if(cv) initCanvas(cv,parseFloat(card.dataset.hue||'270'),card.dataset.s||'noise',card);
    });
    if(cat==='2d') rebuildLightbox();
  }catch(e){console.error('gallery load failed',e);}
}

// reload gallery on next visit (after upload in dashboard)
function invalidateGallery(cat){ delete galLoaded[cat]; }

// hook into show()
const _showOrig=show;
function show(id){
  _showOrig(id);
  if(id==='2d'||id==='3d') loadGallery(id);
}

// render active gallery shaders in the loop
window.__loopExtras=window.__loopExtras||[];
window.__loopExtras.push(t=>{
  const gid=cur_pg==='2d'?'grid-2d':cur_pg==='3d'?'grid-3d':null;
  if(!gid)return;
  document.querySelectorAll(`#${gid} .gc canvas`).forEach(cv=>{
    if(cv._m){cv._m.uniforms.u_t.value=t;cv._r.render(cv._s,cv._cam);}
  });
});

// ── LIGHTBOX ─────────────────────────────────────────────────────────────────
const lb       = document.getElementById('lb');
const lbTitle  = document.getElementById('lb-title');
const lbSub    = document.getElementById('lb-sub');
const lbDl     = document.getElementById('lb-dl');
const lbClose  = document.getElementById('lb-close');
const lbPrev   = document.getElementById('lb-prev');
const lbNext   = document.getElementById('lb-next');
const lbStrip  = document.getElementById('lb-strip');
const lbImg    = document.getElementById('lb-img');
const lbCounter= document.getElementById('lb-counter');

let cards2d=[], lbIdx=0, lbOpen=false;

function rebuildLightbox(){
  cards2d=[...document.querySelectorAll('#grid-2d .gc')];
  lbStrip.innerHTML='';
  cards2d.forEach((card,i)=>{
    const thumb=document.createElement('div');
    thumb.className='lb-thumb';
    const img=document.createElement('img');
    img.src=card.dataset.src||'';
    img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
    thumb.appendChild(img);
    lbStrip.appendChild(thumb);
    thumb.addEventListener('click',()=>openLb(i));
  });
  cards2d.forEach((card,i)=>card.addEventListener('click',()=>openLb(i)));
}

function openLb(idx){
  if(!cards2d.length)return;
  lbIdx=((idx%cards2d.length)+cards2d.length)%cards2d.length;
  lbOpen=true;
  lb.classList.add('open');
  document.body.style.overflow='hidden';
  loadLbItem();
}

function closeLb(){
  lbOpen=false;
  lb.classList.remove('open');
  document.body.style.overflow='';
}

function loadLbItem(){
  const card=cards2d[lbIdx];
  const title=card.dataset.title||'';
  const tag=card.dataset.tag||'';
  const src=card.dataset.src||'';
  lbTitle.textContent=title;
  lbSub.textContent=tag;
  lbCounter.textContent=(lbIdx+1)+' / '+cards2d.length;
  lbImg.classList.add('show');
  document.getElementById('lb-canvas-wrap').style.display='none';
  lbImg.src=src;
  // update strip active state
  document.querySelectorAll('#lb-strip .lb-thumb').forEach((t,i)=>t.classList.toggle('act',i===lbIdx));
  document.querySelectorAll('#lb-strip .lb-thumb')[lbIdx]?.scrollIntoView({inline:'center',behavior:'smooth'});
  // download
  lbDl.onclick=()=>{const a=document.createElement('a');a.href=src;a.download=title;a.click();};
}

lbClose.addEventListener('click',closeLb);
lbPrev.addEventListener('click',()=>openLb(lbIdx-1));
lbNext.addEventListener('click',()=>openLb(lbIdx+1));
document.addEventListener('keydown',e=>{
  if(!lbOpen)return;
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowRight')openLb(lbIdx+1);
  if(e.key==='ArrowLeft')openLb(lbIdx-1);
});
</script>
